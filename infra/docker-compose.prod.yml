version: '3.9'

# Production Docker Compose — intended for single-server or Compose-based deploys.
# For Kubernetes (EKS) production deployments, use the k8s/ manifests instead.

services:
  # ─── API ──────────────────────────────────────────────────────────────────────
  api:
    image: ${REGISTRY}/documentifyit-api:${IMAGE_TAG:-latest}
    container_name: documentifyit-api
    restart: unless-stopped
    env_file:
      - ../apps/api/.env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - documentifyit

  # ─── Web ──────────────────────────────────────────────────────────────────────
  web:
    image: ${REGISTRY}/documentifyit-web:${IMAGE_TAG:-latest}
    container_name: documentifyit-web
    restart: unless-stopped
    env_file:
      - ../apps/web/.env
    ports:
      - '3000:3000'
    networks:
      - documentifyit

  # ─── PostgreSQL (managed RDS preferred in prod) ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: documentifyit-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - documentifyit
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: documentifyit-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - documentifyit
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Traefik (reverse proxy + TLS) ────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: documentifyit-traefik
    restart: unless-stopped
    command:
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.websecure.address=:443'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge=true'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web'
      - '--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}'
      - '--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json'
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - documentifyit

volumes:
  postgres_data:
  redis_data:
  traefik_letsencrypt:

networks:
  documentifyit:
    name: documentifyit-prod
